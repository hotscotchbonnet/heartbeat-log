name: Generate IPFS Key Pair

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    container:
      image: ipfs/kubo:latest
    steps:
      - name: Generate RSA key
        run: |
          # Initialize IPFS repo (needed for key commands)
          ipfs init
          # Generate a 2048-bit RSA key named 'heartbeat-key'
          ipfs key gen --type=rsa --size=2048 heartbeat-key
          # Get the IPNS name (Peer ID)
          IPNS_NAME=$(ipfs key list -l | grep heartbeat-key | awk '{print $2}')
          echo "IPNS_NAME=$IPNS_NAME" >> $GITHUB_ENV
          # Export the private key to a file (in PEM format)
          ipfs key export heartbeat-key -o /tmp/key.pem
          # Convert PEM to base64 for safe storage as a secret
          BASE64_KEY=$(base64 -w 0 /tmp/key.pem)
          echo "BASE64_PRIVATE_KEY=$BASE64_KEY" >> $GITHUB_ENV
      - name: Show values (copy these)
        run: |
          echo "IPNS_NAME: ${{ env.IPNS_NAME }}"
          echo "BASE64_PRIVATE_KEY: ${{ env.BASE64_PRIVATE_KEY }}"
