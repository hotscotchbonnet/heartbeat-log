name: Generate w3name Key (Python)

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install w3name Python package
        run: pip install w3name
      - name: Generate key
        run: |
          python3 << 'EOF'
          import w3name
          import base64
          name = w3name.Name.create()
          private_key_bytes = name.key.bytes
          private_key_b64 = base64.b64encode(private_key_bytes).decode('ascii')
          print("IPNS_NAME=" + name.to_str())
          print("W3NAME_PRIVATE_KEY=" + private_key_b64)
          EOF
