name: Daily Site Heartbeat

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write   # needed to create releases

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install eth_account requests dnspython

      - name: Run heartbeat agent
        id: heartbeat
        env:
          AGENT_PRIVATE_KEY: ${{ secrets.AGENT_PRIVATE_KEY }}
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
          # IPNS_NAME is no longer needed, but we can keep it for optional future use
        run: python .github/scripts/heartbeat.py

      - name: Download the log from IPFS (using the new CID)
        run: |
          curl -o log.json "https://ipfs.io/ipfs/${{ steps.heartbeat.outputs.new_cid }}"

      - name: Create GitHub Release and upload log.json
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Heartbeat Log"
          body: "Automatic daily heartbeat log. CID: ${{ steps.heartbeat.outputs.new_cid }}"
          files: log.json
          prerelease: false
          draft: false
          make_latest: true
