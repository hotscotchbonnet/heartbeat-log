name: Daily Site Heartbeat

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install eth_account requests dnspython

      - name: Install IPFS (kubo)
        run: |
          wget https://dist.ipfs.tech/kubo/v0.30.0/kubo_v0.30.0_linux-amd64.tar.gz
          tar -xvzf kubo_v0.30.0_linux-amd64.tar.gz
          cd kubo
          sudo bash install.sh
          ipfs init
          ipfs daemon --enable-namesys-pubsub &
          sleep 10   # wait for daemon to start

      - name: Run heartbeat agent
        env:
          AGENT_PRIVATE_KEY: ${{ secrets.AGENT_PRIVATE_KEY }}
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
          IPFS_PRIVATE_KEY: ${{ secrets.IPFS_PRIVATE_KEY }}
          IPNS_NAME: ${{ secrets.IPNS_NAME }}
        run: python .github/scripts/heartbeat.py

      - name: Stop IPFS daemon (cleanup)
        run: killall ipfs || true
