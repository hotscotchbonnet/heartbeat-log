name: Daily Site Heartbeat

on:
  schedule:
    - cron: '0 9 * * *'      # Runs every day at 09:00 UTC
  workflow_dispatch:          # Allows manual trigger from GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Opt into Node.js 24 (silences deprecation warning)

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install eth_account requests dnspython

      - name: Run heartbeat agent
        env:
          AGENT_PRIVATE_KEY: ${{ secrets.AGENT_PRIVATE_KEY }}
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
          FILEBASE_ACCESS_KEY: ${{ secrets.FILEBASE_ACCESS_KEY }}
          IPNS_NAME: ${{ secrets.IPNS_NAME }}
        run: python .github/scripts/heartbeat.py
