name: Daily Site Heartbeat

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install eth_account requests dnspython

      - name: Run heartbeat agent (Python)
        id: heartbeat
        env:
          AGENT_PRIVATE_KEY: ${{ secrets.AGENT_PRIVATE_KEY }}
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
          IPNS_NAME: ${{ secrets.IPNS_NAME }}
        run: python .github/scripts/heartbeat.py

      - name: Publish to IPNS using IPFS Docker
        uses: docker://ipfs/kubo:latest
        env:
          PRIVATE_KEY_B64: ${{ secrets.IPFS_PRIVATE_KEY_BASE64 }}
          IPNS_NAME: ${{ secrets.IPNS_NAME }}
          NEW_CID: ${{ steps.heartbeat.outputs.new_cid }}
        with:
          entrypoint: /bin/sh
          args: |
            -c "
            set -e
            echo \"$PRIVATE_KEY_B64\" | base64 -d > /tmp/key.pem
            ipfs init
            # Import the key
            ipfs key import heartbeat-key -f pem-pkcs8-cleartext /tmp/key.pem
            # Fetch the CID from a public gateway (to make it available locally)
            echo \"Fetching $NEW_CID from gateway...\"
            wget -O /dev/null https://ipfs.io/ipfs/$NEW_CID || curl -s -o /dev/null https://ipfs.io/ipfs/$NEW_CID
            # Alternative: use ipfs get (requires the daemon, but we can run a temporary daemon)
            # Start the IPFS daemon in the background
            ipfs daemon &
            DAEMON_PID=$!
            # Wait for daemon to start
            sleep 10
            # Now fetch the CID
            ipfs get /ipfs/$NEW_CID
            # Publish to IPNS
            ipfs name publish --key=heartbeat-key /ipfs/$NEW_CID
            # Kill daemon (optional)
            kill $DAEMON_PID
            echo \"✅ Published $NEW_CID to $IPNS_NAME\"
            "
