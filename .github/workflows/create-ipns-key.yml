name: Create IPNS Key

on:
  workflow_dispatch:

jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - name: Install Kubo
        run: |
          wget https://dist.ipfs.tech/kubo/v0.30.0/kubo_v0.30.0_linux-amd64.tar.gz
          tar -xvzf kubo_v0.30.0_linux-amd64.tar.gz
          cd kubo
          sudo bash install.sh
          ipfs init

      - name: Generate IPNS key
        id: gen
        run: |
          # Generate key
          IPNS_NAME=$(ipfs key gen --type=rsa --size=2048 heartbeat-key)
          echo "IPNS_NAME=$IPNS_NAME" >> $GITHUB_OUTPUT
          echo "Generated IPNS name: $IPNS_NAME"
          
          # Export private key to file
          ipfs key export heartbeat-key -o key.priv
          if [ ! -f key.priv ]; then
            echo "ERROR: key.priv not created"
            exit 1
          fi
          base64 -w 0 key.priv > key.b64
          PRIV_B64=$(cat key.b64)
          echo "IPFS_PRIVATE_KEY=$PRIV_B64" >> $GITHUB_OUTPUT
          echo "Private key exported and encoded (length: ${#PRIV_B64})"

      - name: Display values (copy these)
        run: |
          echo "========================================="
          echo "IPNS_NAME: ${{ steps.gen.outputs.IPNS_NAME }}"
          echo "========================================="
          echo "IPFS_PRIVATE_KEY (base64):"
          echo "${{ steps.gen.outputs.IPFS_PRIVATE_KEY }}"
          echo "========================================="
          echo "Add these two as secrets in your repository:"
          echo "  - Secret name: IPNS_NAME"
          echo "  - Secret name: IPFS_PRIVATE_KEY"
